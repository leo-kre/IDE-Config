##### reload
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

##### prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

##### pane navigation (hjkl)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

##### create windows/panes in current pane's directory
# new window: current path
unbind c
bind c new-window -c "#{pane_current_path}"

# vertical split: current path
unbind '"'
bind '"' split-window -v -c "#{pane_current_path}"

# horizontal split: current path
unbind %
bind % split-window -h -c "#{pane_current_path}"

##### basics
set -g mouse on
set -g default-terminal "tmux-256color"
set -g status-position top
set -s escape-time 10
setw -g automatic-rename on
set -g allow-rename off
set -g renumber-windows on

##### coal / IBM monochrome palette
# bg     : #0b0b0b
# panel  : #1c1c1c
# border : #2a2a2a
# dim    : #5f5f5f
# fg     : #c0c0c0
# bright : #ffffff

# status bar (top)
set -g status-style "bg=#0b0b0b,fg=#c0c0c0"
set -g status-left-length 100
set -g status-right-length 150

# window tabs (pure grayscale, no icons)
set -g window-status-style "bg=#1c1c1c,fg=#c0c0c0"
set -g window-status-format '#[bg=#1c1c1c,fg=#5f5f5f][#I] #[fg=#c0c0c0]#W '

set -g window-status-current-style "bg=#0b0b0b,fg=#ffffff,bold"
set -g window-status-current-format '#[bg=#0b0b0b,fg=#ffffff,bold][#I] #W '

# separator between window tiles
set -g window-status-separator " "

##### borders (monochrome)
set -g pane-border-style "fg=#2a2a2a"
set -g pane-active-border-style "fg=#c0c0c0"

##### messages / prompts / modes (monochrome)
set -g message-style "bg=#0b0b0b,fg=#c0c0c0"
set -g message-command-style "bg=#0b0b0b,fg=#c0c0c0"
set -g mode-style "bg=#1c1c1c,fg=#ffffff"

##### status content (minimal, IBM-ish)
set -g status-left "  #[fg=#ffffff,bold]#S#[fg=#5f5f5f] │ "
set -g status-right "#[fg=#5f5f5f]#{pane_current_path} #[fg=#5f5f5f]│ #[fg=#c0c0c0]%Y-%m-%d %H:%M  "

##### keep one empty line between status bar and terminal
set -g status 2
set -g status-format[1] ""

##### optional: make copy-mode keys vi-like (useful with hjkl muscle memory)
setw -g mode-keys vi

##### plugins (TPM optional)
set -g @plugin 'tmux-plugins/tpm'
# run '~/.tmux/plugins/tpm/tpm'  # uncomment if you use TPM
